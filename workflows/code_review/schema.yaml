$schema: http://json-schema.org/draft-07/schema#
title: code-review workflow config
type: object
required:
  - workflow
  - schema-version
  - instance
  - repository
  - runtimes
  - agents
  - gates
  - triggers
  - storage
properties:
  workflow:
    const: code-review
  schema-version:
    type: integer
    enum: [1]

  instance:
    type: object
    required: [name, engine-owner]
    properties:
      name: {type: string}
      engine-owner: {type: string, enum: [hermes, openclaw]}

  repository:
    type: object
    required: [local-path, github-slug, active-lane-label]
    properties:
      local-path: {type: string}
      github-slug: {type: string}
      active-lane-label: {type: string}

  runtimes:
    type: object
    minProperties: 1
    additionalProperties:
      oneOf:
        - $ref: "#/definitions/acpx-codex-runtime"
        - $ref: "#/definitions/claude-cli-runtime"

  agents:
    type: object
    required: [coder, internal-reviewer, external-reviewer]
    properties:
      coder:
        type: object
        minProperties: 1
        additionalProperties:
          $ref: "#/definitions/coder-tier"
      internal-reviewer:
        type: object
        required: [name, model, runtime]
        properties:
          name: {type: string}
          model: {type: string}
          runtime: {type: string}
          freeze-coder-while-running: {type: boolean}
      external-reviewer:
        type: object
        required: [enabled, name]
        properties:
          enabled: {type: boolean}
          name: {type: string}
          provider: {type: string}
          cache-seconds: {type: integer}
      advisory-reviewer:
        type: object
        required: [enabled, name]
        properties:
          enabled: {type: boolean}
          name: {type: string}

  gates:
    type: object
    required: [internal-review, external-review, merge]
    properties:
      internal-review:
        type: object
        properties:
          pass-with-findings-tolerance: {type: integer}
          require-pass-clean-before-publish: {type: boolean}
          request-cooldown-seconds: {type: integer}
      external-review:
        type: object
        properties:
          required-for-merge: {type: boolean}
      merge:
        type: object
        properties:
          require-ci-acceptable: {type: boolean}

  triggers:
    type: object
    required: [lane-selector]
    properties:
      lane-selector:
        type: object
        required: [type, label]
        properties:
          type: {type: string}
          label: {type: string}
      start-conditions:
        type: array
        items: {type: object}

  escalation:
    type: object
    additionalProperties: {type: integer}

  schedules:
    type: object
    properties:
      watchdog-tick:
        type: object
        properties:
          interval-minutes: {type: integer}
      milestone-notifier:
        type: object
        properties:
          interval-hours: {type: integer}
          delivery:
            type: object
            properties:
              channel: {type: string}
              chat-id: {type: string}

  prompts:
    type: object
    additionalProperties: {type: string}

  storage:
    type: object
    required: [ledger, health, audit-log]
    properties:
      ledger: {type: string}
      health: {type: string}
      audit-log: {type: string}
      cron-jobs-path: {type: string}
      hermes-cron-jobs-path: {type: string}
      sessions-state: {type: string}

  codex-bot:
    type: object
    properties:
      logins:
        type: array
        items: {type: string}
      clean-reactions:
        type: array
        items: {type: string}
      pending-reactions:
        type: array
        items: {type: string}

  observability:
    type: object
    properties:
      github-comments:
        type: object
        required: [enabled]
        additionalProperties: false
        properties:
          enabled: {type: boolean}
          mode: {type: string, enum: [edit-in-place]}
          include-events:
            type: array
            items: {type: string}
          suppress-transient-failures: {type: boolean}

definitions:
  acpx-codex-runtime:
    type: object
    required: [kind, session-idle-freshness-seconds, session-idle-grace-seconds, session-nudge-cooldown-seconds]
    properties:
      kind: {const: acpx-codex}
      session-idle-freshness-seconds: {type: integer, minimum: 1}
      session-idle-grace-seconds: {type: integer, minimum: 1}
      session-nudge-cooldown-seconds: {type: integer, minimum: 1}

  claude-cli-runtime:
    type: object
    required: [kind, max-turns-per-invocation, timeout-seconds]
    properties:
      kind: {const: claude-cli}
      max-turns-per-invocation: {type: integer, minimum: 1}
      timeout-seconds: {type: integer, minimum: 1}

  coder-tier:
    type: object
    required: [name, model, runtime]
    properties:
      name: {type: string}
      model: {type: string}
      runtime: {type: string}
